<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                url("image/campus.jpg.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 250px;
            display: block;
            margin: 0 auto 15px auto;
        }

        .login-box {
            background: rgb(255, 255, 255);
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .input-group input:focus {
            border-color: #1cc88a;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #1cc88a;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #17a673;
        }

        .extra-text {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
        }

        .extra-text a {
            color: #6054ff;
            text-decoration: underline;
            font-weight: bold;
        }

        .extra-text a:hover {
            text-decoration: none;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2><img src="image/logo.png.png" class="logo"></h2>
        <h3>Login</h3>

        <div id="error-msg" class="error"></div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button onclick="validateLogin()">Login</button>

        <div class="extra-text" style="text-align:center; margin-top:15px;">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <div class="footer-text" style="text-align:center; margin-top:15px; font-size:13px; color:gray;">
            © 2026 my DIU
        </div>


        <script>
            function validateLogin() {
                let username = document.getElementById("username").value;
                let password = document.getElementById("password").value;
                let errorMsg = document.getElementById("error-msg");

                if (username === "" || password === "") {
                    errorMsg.innerText = "Please fill all fields!";
                    return;
                }

                    alert("Login Successful!");

                } else {
                    error.MsginnerText = "Invalid username or password!";
                }
            }
        </script>

</body>

</html>
